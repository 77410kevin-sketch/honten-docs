  }

  header{background:linear-gradient(120deg,#1F3A68,#2a5298);color:#fff;padding:22px 26px}
  header h1{margin:0;font-size:22px;font-weight:800;letter-spacing:.5px}
  header .meta{margin-top:6px;font-size:12.5px;opacity:.85}
  .wrap{max-width:1280px;margin:0 auto;padding:18px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:16px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .stat b{display:block;font-size:24px;font-weight:800;color:var(--ink)}
  .stat b small{font-size:13px;font-weight:700;color:var(--muted)}
  .stat span{font-size:12px;color:var(--muted)}
  .tabs{display:flex;gap:8px;margin-bottom:14px}
  .tabbtn{border:1px solid var(--line);background:var(--card);color:var(--sub);
    padding:8px 18px;border-radius:10px;font-size:13.5px;font-weight:700;cursor:pointer}
  .tabbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--sub);
    padding:5px 12px;border-radius:20px;font-size:12.5px;cursor:pointer;user-select:none}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-left:auto;font-size:12px;color:var(--sub)}
  .legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}
  /* gantt */
  .gantt{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .scroll{overflow-x:auto}
  .grid{position:relative;min-width:900px}
  .axis{display:flex;position:sticky;top:0;background:var(--card);border-bottom:1px solid var(--line);z-index:3}
  .axis .lbl{flex:0 0 210px;padding:8px 12px;font-size:11px;color:var(--muted);
    border-right:1px solid var(--line);font-weight:700}
  .axis .months{position:relative;flex:1;height:34px}
  .tick{position:absolute;top:0;bottom:0;border-left:1px solid var(--line)}
  .tick span{position:absolute;top:5px;left:4px;font-size:10.5px;color:var(--muted);white-space:nowrap}
  .grp-h{background:linear-gradient(90deg,rgba(31,58,104,.08),transparent);
    padding:7px 12px;font-weight:800;color:var(--ink);font-size:13.5px;
    border-top:1px solid var(--line);display:flex;align-items:center;gap:8px}
  .grp-h .cnt{font-size:11px;color:var(--muted);font-weight:600}
  .row{display:flex;border-top:1px solid var(--line);position:relative}
  .row:hover{background:rgba(30,136,229,.05)}
  .row .lbl{flex:0 0 210px;padding:8px 12px;border-right:1px solid var(--line)}
  .row .lbl .t{font-weight:700;font-size:12.5px;color:var(--text)}
  .row .lbl .s{font-size:11px;color:var(--muted);margin-top:2px}
  .track{position:relative;flex:1;min-height:46px}
  .vline{position:absolute;top:0;bottom:0;border-left:1px dashed var(--line);opacity:.5}
  .today{position:absolute;top:0;bottom:0;border-left:2px solid var(--today);z-index:2}
  .today span{position:absolute;top:2px;left:4px;font-size:10px;color:var(--today);font-weight:700}
  .barr{position:absolute;height:22px;top:11px;border-radius:6px;display:flex;align-items:center;
    padding:0 8px;color:#fff;font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer;
    box-shadow:0 1px 3px rgba(0,0,0,.15)}
  .barr.done{background:var(--done)} .barr.sampling{background:var(--sampling)}
  .barr.mold{background:var(--mold)} .barr.verified{background:var(--verified)}
  .dia{position:absolute;top:13px;width:16px;height:16px;transform:rotate(45deg);
    border:2px solid #fff;z-index:2;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .dia.done{background:var(--done)} .dia.sampling{background:var(--sampling)}
  .dia.mold{background:var(--mold)} .dia.verified{background:var(--verified)}
  /* mold table */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:4px 0;overflow:hidden}
  table.mt{width:100%;border-collapse:collapse;font-size:13px}
  table.mt th{background:var(--ink);color:#fff;padding:9px 10px;text-align:left;font-size:12px;position:sticky;top:0}
  table.mt td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top;color:var(--text)}
  table.mt tr:nth-child(even) td{background:rgba(0,0,0,.015)}
  .mgrp td{background:var(--ink)!important;color:#fff;font-weight:800;font-size:12.5px}
  .pill{display:inline-block;font-size:11px;font-weight:800;padding:2px 9px;border-radius:20px;white-space:nowrap}
  .pill.mold{background:var(--mold-bg);color:var(--mold)}
  .pill.done{background:var(--done-bg);color:var(--done)}
  .pill.verified{background:var(--verified-bg);color:var(--verified)}
  .hide{display:none}
  /* detail */
  .detail{position:fixed;z-index:40;max-width:360px;background:var(--card);
    border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 34px rgba(0,0,0,.28);
    padding:14px 16px;display:none}
  .detail h3{margin:0 0 6px;font-size:14.5px;color:var(--ink)}
  .detail .tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;margin-bottom:8px}
  .detail table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
  .detail td{padding:3px 4px;vertical-align:top;border-bottom:1px solid var(--line)}
  .detail td:first-child{color:var(--muted);white-space:nowrap;width:64px}
  .detail .items{margin:6px 0 0;padding-left:16px}
  .detail .items li{margin:1px 0}
  .close{float:right;cursor:pointer;color:var(--muted);font-weight:700;font-size:16px;line-height:1}
  footer{text-align:center;color:var(--muted);font-size:11.5px;padding:22px}
</style>

const AXIS_START=new Date("2026-06-12"),AXIS_END=new Date("2026-08-08"),TODAY=new Date("2026-07-03");
const DAY=86400000,SPAN=(AXIS_END-AXIS_START)/DAY;
const pct=d=>Math.max(0,Math.min(100,((new Date(d)-AXIS_START)/DAY)/SPAN*100));
const md=d=>(d.getMonth()+1)+"/"+d.getDate();

// ===== 統計 =====
const moldCount=molds.length; // 16
const sampCount=data.filter(d=>d.kind==="打樣").reduce((s,d)=>s+d.items.length,0);
const models=[...new Set(data.map(d=>d.model))];
const doneMold=molds.filter(m=>m.st!=="mold").length, ingMold=molds.filter(m=>m.st==="mold").length;
document.getElementById("stats").innerHTML=[
 ["機種數",models.length,""],
 ["開模模具",`${moldCount}<small> 套</small>`,"var(--mold)"],
 ["└ 已開好/已驗證",doneMold,"var(--done)"],
 ["└ 開模中",ingMold,"var(--mold)"],
 ["打樣件數",`${sampCount}<small> 件</small>`,"var(--sampling)"],
 ["訂單區塊",data.length,""],
].map(([s,b,c])=>`<div class="stat"><b style="${c?'color:'+c:''}">${b}</b><span>${s}</span></div>`).join("");

// ===== 分頁切換 =====
document.querySelectorAll(".tabbtn").forEach(btn=>btn.onclick=()=>{
  document.querySelectorAll(".tabbtn").forEach(b=>b.classList.toggle("on",b===btn));
  const v=btn.dataset.v;
  document.getElementById("view-gantt").classList.toggle("hide",v!=="gantt");
  document.getElementById("view-mold").classList.toggle("hide",v!=="mold");
});

// ===== 機種篩選 =====
let active=new Set(models);
const chipWrap=document.getElementById("modelChips");
function renderChips(){
  chipWrap.innerHTML="";
  const all=document.createElement("span");
  all.className="chip"+(active.size===models.length?" on":"");
  all.textContent="全部";all.onclick=()=>{active=new Set(models);renderChips();renderG()};
  chipWrap.appendChild(all);
  models.forEach(m=>{const c=document.createElement("span");
    c.className="chip"+(active.has(m)?" on":"");c.textContent=m;
    c.onclick=()=>{if(active.has(m)&&active.size>1)active.delete(m);else active.add(m);renderChips();renderG()};
    chipWrap.appendChild(c);});
}

function ticks(){let h='';for(let t=new Date(AXIS_START);t<=AXIS_END;t=new Date(+t+DAY))
  if(t.getDay()===1)h+=`<div class="tick" style="left:${pct(t)}%"><span>${md(t)}</span></div>`;return h;}
function weeklines(){let h='';for(let t=new Date(AXIS_START);t<=AXIS_END;t=new Date(+t+DAY))
  if(t.getDay()===1)h+=`<div class="vline" style="left:${pct(t)}%"></div>`;return h;}
const todayLine=`<div class="today" style="left:${pct(TODAY)}%"><span>今日</span></div>`;

const grid=document.getElementById("grid");
function renderG(){
  const shown=models.filter(m=>active.has(m));
  let html=`<div class="axis"><div class="lbl">機種 / 訂單</div><div class="months">${ticks()}</div></div>`;
  shown.forEach(m=>{
    const rows=data.filter(d=>d.model===m);
    html+=`<div class="grp-h">${m} <span class="cnt">${rows.length} 筆</span></div>`;
    rows.forEach(d=>{
      const idx=data.indexOf(d);
      let track;
      if(d.nodate){
        track=`<div class="barr ${d.status}" onclick="showD(${idx},event)" style="left:6px">${d.statusTxt}</div>`;
      }else{
        const L=pct(d.start),R=pct(d.end),W=Math.max(R-L,2);
        const bar=`<div class="barr ${d.status}" onclick="showD(${idx},event)" style="left:${L}%;width:${W}%">${d.statusTxt}${d.tentative?' ?':''}</div>`;
        const dia=`<div class="dia ${d.status}" onclick="showD(${idx},event)" title="鴻騰交期 ${md(new Date(d.end))}" style="left:calc(${R}% - 8px)"></div>`;
        const ms=d.milestone?`<div class="dia ${d.status}" style="left:calc(${pct(d.milestone)}% - 6px);top:15px;width:12px;height:12px;opacity:.5" title="${d.msTxt||''} ${md(new Date(d.milestone))}"></div>`:'';
        track=`${ms}${bar}${dia}`;
      }
      const shipTxt=d.ship?`已寄 ${md(new Date(d.ship))}`:(d.nodate?'待下單':'交期 '+md(new Date(d.end))+(d.tentative?'?':''));
      html+=`<div class="row"><div class="lbl"><div class="t">${d.po.split(' /')[0].split('\n')[0]}</div>
        <div class="s">${d.kind} · ${shipTxt}</div></div>
        <div class="track">${weeklines()}${todayLine}${track}</div></div>`;
    });
  });
  grid.innerHTML=html;
}

// ===== 模具彙整表 =====
function renderMold(){
  let html=`<tr><th>#</th><th>品名</th><th>鴻騰料號</th><th>廠商</th><th>模具狀態</th><th>說明</th></tr>`;
  let lastProj="",n=0;
  molds.forEach(m=>{
    if(m.proj!==lastProj){lastProj=m.proj;
      const c=molds.filter(x=>x.proj===m.proj).length;
      html+=`<tr class="mgrp"><td colspan="6">${m.proj}　<span style="font-weight:600;opacity:.8">${c} 套</span></td></tr>`;}
    n++;
    html+=`<tr><td>${n}</td><td><b>${m.name}</b></td><td>${m.ht}</td><td>${m.vendor}</td>
      <td><span class="pill ${m.st}">${m.stTxt}</span></td><td>${m.note}</td></tr>`;
  });
  document.getElementById("moldTable").innerHTML=html;
}

// ===== 明細卡 =====
const det=document.getElementById("detail");
function showD(i,e){
  const d=data[i];
  const cmap={done:["var(--done)","var(--done-bg)"],mold:["var(--mold)","var(--mold-bg)"],
    sampling:["var(--sampling)","var(--sampling-bg)"],verified:["var(--verified)","var(--verified-bg)"]};
  const[color,bgc]=cmap[d.status];
  det.innerHTML=`<span class="close" onclick="det.style.display='none'">×</span>
    <span class="tag" style="background:${bgc};color:${color}">${d.kind}·${d.statusTxt}</span>
    <h3>${d.model}</h3>
    <ul class="items">${d.items.map(x=>`<li>${x}</li>`).join("")}</ul>
    <table>
      <tr><td>訂單號</td><td>${d.po.replace(/\n/g,'<br>')}</td></tr>
      <tr><td>採購</td><td>${d.buyer}</td></tr>
      <tr><td>廠商製程</td><td>${d.vendor}</td></tr>
      <tr><td>鴻騰交期</td><td>${d.nodate?'待下單':md(new Date(d.end))+(d.tentative?'（未定）':'')}${d.ship?' ・已寄 '+md(new Date(d.ship)):''}</td></tr>
      <tr><td>ERP</td><td>${d.erp||'—'}</td></tr>
      <tr><td>備註</td><td>${d.note||'—'}</td></tr>
    </table>`;
  det.style.display="block";
  const x=Math.min(e.clientX,innerWidth-370),y=Math.min(e.clientY+12,innerHeight-280);
  det.style.left=Math.max(10,x)+"px";det.style.top=Math.max(10,y)+"px";
  e.stopPropagation();
}
document.addEventListener("click",e=>{if(!det.contains(e.target)&&!e.target.classList.contains("barr")&&!e.target.classList.contains("dia"))det.style.display="none";});

renderChips();renderG();renderMold();
</script>
