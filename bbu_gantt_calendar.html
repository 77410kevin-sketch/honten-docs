let repFilter = "ALL";
let calMonth = null; // Date first-of-month

const iso = s => { const [y,m,d]=s.split('-').map(Number); return new Date(y, m-1, d); };
const dayDiff = (a,b) => Math.round((b-a)/86400000);
const esc = s => (s||"").replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtMD = d => (d.getMonth()+1)+'/'+d.getDate();

function filteredTasks(){
  return DATA.tasks.filter(t => repFilter==="ALL" || t.rep===repFilter);
}

/* ---------- rep filter buttons ---------- */
function buildRepFilter(){
  const box = document.getElementById('rep-filter');
  const mk = (key,label,color) => {
    const b=document.createElement('button');
    b.className='btn btn-outline-secondary rep-btn'+(repFilter===key?' active':'');
    b.textContent=label;
    if(repFilter===key && color){ b.style.background=color; b.style.borderColor=color; }
    b.onclick=()=>{ repFilter=key; render(); };
    return b;
  };
  box.innerHTML='';
  box.appendChild(mk("ALL","全部",null));
  DATA.reps.forEach(r=> box.appendChild(mk(r,r,DATA.repColors[r])));
}

/* ---------- Gantt ---------- */
function renderGantt(){
  const tasks = filteredTasks();
  const wrap = document.getElementById('view-gantt');
  if(!tasks.length){ wrap.innerHTML='<div class="gantt-wrap p-4 text-muted">此篩選無資料</div>'; return; }
  let min = iso(DATA.minDate), max = iso(DATA.maxDate);
  // padding 10 天
  min = new Date(min.getTime()-10*86400000);
  max = new Date(max.getTime()+10*86400000);
  const totalDays = Math.max(1, dayDiff(min,max));
  const DAY_PX = Math.max(4, Math.min(14, Math.round(1100/totalDays)));
  const W = totalDays*DAY_PX;
  const xOf = d => dayDiff(min, iso(d))*DAY_PX;

  // month ruler
  let months='';
  let cur = new Date(min.getFullYear(), min.getMonth(), 1);
  while(cur<=max){
    const left = dayDiff(min,cur)*DAY_PX;
    if(left>=0) months += `<div class="g-month" style="left:${left}px">${cur.getFullYear()}/${cur.getMonth()+1}</div>`;
    cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
  }
  const todayLeft = xOf(DATA.today);
  const todayMark = (todayLeft>=0 && todayLeft<=W)
     ? `<div class="g-today" style="left:${todayLeft}px"></div><div class="g-today-lbl" style="left:${todayLeft+3}px">今天</div>` : '';

  let rows='';
  tasks.forEach(t=>{
    const left=xOf(t.start);
    const w=Math.max(t.single?14:10, dayDiff(iso(t.start),iso(t.end))*DAY_PX);
    const color=DATA.repColors[t.rep]||'#6c757d';
    const barTxt = t.single ? '' : esc(t.model);
    rows += `<div class="g-row">
      <div class="g-label">
        <div class="m" title="${esc(t.customer)} ｜ ${esc(t.model)}">${esc(t.model)}</div>
        <div class="sub"><span class="chip" style="background:${color}">${t.rep}</span>
          ${esc(t.customer)} · <span class="chip" style="background:${t.stageColor}">${esc(t.stage)}</span></div>
      </div>
      <div class="g-track" style="width:${W}px">
        ${todayMark}
        <div class="g-bar ${t.single?'single':''}" data-tid="${t.id}"
             style="left:${left}px; width:${w}px; background:${color}"
             title="${esc(t.model)} (${t.start}→${t.end})">${barTxt}</div>
      </div></div>`;
  });

  wrap.innerHTML = `<div class="gantt-wrap"><div class="gantt-inner" style="min-width:${280+W}px">
    <div class="g-head"><div class="g-label">機種 / 客戶 / 階段</div>
      <div class="g-ruler" style="width:${W}px">${months}</div></div>
    ${rows}
  </div></div>`;
  wrap.querySelectorAll('.g-bar').forEach(b=>{
    b.addEventListener('click', e=> showPop(e, DATA.tasks.find(t=>t.id==b.dataset.tid)));
  });
}

/* ---------- Calendar ---------- */
function eventsByDate(){
  const map={};
  filteredTasks().forEach(t=> t.events.forEach(e=>{
    (map[e.date]=map[e.date]||[]).push({...e, rep:t.rep, color:DATA.repColors[t.rep],
      model:t.model, customer:t.customer, stage:t.stage, stageColor:t.stageColor, tid:t.id});
  }));
  return map;
}
function renderCalendar(){
  const wrap=document.getElementById('view-calendar');
  const map=eventsByDate();
  if(!calMonth){
    // 預設月份：今天所在月（若無事件在該月則跳到 maxDate 月）
    const t=iso(DATA.today); calMonth=new Date(t.getFullYear(), t.getMonth(), 1);
    const hasThis=Object.keys(map).some(d=> iso(d).getFullYear()===calMonth.getFullYear() && iso(d).getMonth()===calMonth.getMonth());
    if(!hasThis){ const mx=iso(DATA.maxDate); calMonth=new Date(mx.getFullYear(), mx.getMonth(), 1); }
  }
  const y=calMonth.getFullYear(), m=calMonth.getMonth();
  const first=new Date(y,m,1), start=new Date(y,m,1-first.getDay());
  const dows=['日','一','二','三','四','五','六'];
  let cells='';
  for(let i=0;i<42;i++){
    const d=new Date(start.getTime()+i*86400000);
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const other=d.getMonth()!==m;
    const isToday=ds===DATA.today;
    const evs=map[ds]||[];
    let evHtml=evs.slice(0,3).map(e=>`<div class="cal-ev" style="background:${e.color}" data-tid="${e.tid}"
        title="${esc(e.model)}：${esc(e.text)}">${esc(e.model)}·${esc(e.text)}</div>`).join('');
    if(evs.length>3) evHtml+=`<div class="cal-more" data-date="${ds}">+${evs.length-3} 更多…</div>`;
    cells+=`<div class="cal-cell ${other?'other':''} ${isToday?'today':''}">
      <div class="cal-date">${d.getDate()}</div>${evHtml}</div>`;
  }
  wrap.innerHTML=`<div class="cal-wrap">
    <div class="cal-head">
      <button class="btn btn-sm btn-outline-secondary" id="cal-prev"><i class="bi bi-chevron-left"></i></button>
      <h5 class="mb-0">${y} 年 ${m+1} 月</h5>
      <button class="btn btn-sm btn-outline-secondary" id="cal-next"><i class="bi bi-chevron-right"></i></button>
      <button class="btn btn-sm btn-outline-primary" id="cal-today">今天</button>
    </div>
    <div class="cal-grid">${dows.map(x=>`<div class="cal-dow">${x}</div>`).join('')}${cells}</div>
  </div>`;
  document.getElementById('cal-prev').onclick=()=>{ calMonth=new Date(y,m-1,1); renderCalendar(); };
  document.getElementById('cal-next').onclick=()=>{ calMonth=new Date(y,m+1,1); renderCalendar(); };
  document.getElementById('cal-today').onclick=()=>{ const t=iso(DATA.today); calMonth=new Date(t.getFullYear(),t.getMonth(),1); renderCalendar(); };
  wrap.querySelectorAll('.cal-ev').forEach(el=> el.addEventListener('click', e=>{
    showPop(e, DATA.tasks.find(t=>t.id==el.dataset.tid)); }));
  wrap.querySelectorAll('.cal-more').forEach(el=> el.addEventListener('click', e=> showDayPop(e, el.dataset.date, map)));
}

      <b>${ev.date.slice(5)}</b> ${esc(ev.text)||'—'}</div>`).join('');

     <div class="text-muted mb-1" style="font-size:.72rem">階段 ${esc(t.stage)}｜${t.start} → ${t.end}</div>${evs}`;
  placePop(e);
}
function showDayPop(e, ds, map){
  const pop=document.getElementById('evpop');
  const evs=(map[ds]||[]).map(ev=>`<div class="line"><span class="tag" style="background:${ev.color}">${ev.rep}</span>
     <span class="tag" style="background:${ev.side==='業務'?'#0d6efd':'#198754'}">${ev.side}</span>
     ${esc(ev.model)}：${esc(ev.text)||'—'}</div>`).join('');
  pop.innerHTML=`<h6>${ds}（${(map[ds]||[]).length} 筆）</h6>${evs}`;
  placePop(e);
}
function placePop(e){
  const pop=document.getElementById('evpop');
  pop.style.display='block';
  let x=e.clientX+12, y=e.clientY+12;
  const r=pop.getBoundingClientRect();
  if(x+r.width>window.innerWidth-10) x=window.innerWidth-r.width-10;
  if(y+r.height>window.innerHeight-10) y=window.innerHeight-r.height-10;
  pop.style.left=x+'px'; pop.style.top=y+'px';
}
document.addEventListener('click', e=>{
  if(!e.target.closest('.g-bar') && !e.target.closest('.cal-ev') && !e.target.closest('.cal-more') && !e.target.closest('.ev-pop'))
    document.getElementById('evpop').style.display='none';
});

/* ---------- mode switch ---------- */
function render(){ buildRepFilter(); renderGantt(); renderCalendar(); }
document.querySelectorAll('.mode-btn').forEach(b=> b.addEventListener('click', ()=>{
  document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  const g=b.dataset.mode==='gantt';
  document.getElementById('view-gantt').classList.toggle('hidden', !g);
  document.getElementById('view-calendar').classList.toggle('hidden', g);
}));
render();
</script>
</body>
</html>
