<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>鴻騰電子 — 公開報告</title>
<style>
  body{
    font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
    background:linear-gradient(135deg,#f5f7fa 0%,#c3cfe2 100%);
    min-height:100vh; margin:0; color:#2c3e50;
  }
  .hero{
    background:linear-gradient(135deg,#1a3a5c 0%,#6610f2 100%);
    color:#fff; text-align:center; padding:3rem 1rem 2.6rem;
  }
  .hero h1{margin:.2rem 0; font-size:1.9rem;}
  .hero p{margin:.3rem 0; opacity:.85; font-size:.95rem;}
  .hero .badge{
    display:inline-block; margin-top:.7rem; background:rgba(255,255,255,.18);
    border:1px solid rgba(255,255,255,.35); border-radius:999px;
    padding:.25rem .9rem; font-size:.8rem;
  }
  .hero .home-link{
    display:inline-block; margin-top:1rem; color:#fff; text-decoration:none;
    background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.45);
    border-radius:999px; padding:.4rem 1.1rem; font-size:.88rem; transition:background .15s;
  }
  .hero .home-link:hover{ background:rgba(255,255,255,.28); }
  .wrap{max-width:920px; margin:0 auto; padding:2rem 1.1rem 4rem;}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:1rem;}
  .card{
    background:#fff; border-radius:14px; padding:1.3rem 1.4rem; text-decoration:none; color:inherit;
    box-shadow:0 2px 12px rgba(60,70,90,.08); transition:transform .15s,box-shadow .15s;
    display:block; border:1px solid #eef0f3;
  }
  .card:hover{transform:translateY(-3px); box-shadow:0 10px 26px rgba(60,70,90,.15);}
  .card .icon{font-size:2rem;}
  .card .label{font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; color:#6610f2; font-weight:700; margin-top:.5rem;}
  .card h3{margin:.25rem 0 .4rem; font-size:1.15rem;}
  .card p{margin:0; font-size:.86rem; color:#6b7a8d; line-height:1.5;}
  .empty{text-align:center; color:#6b7a8d; padding:2rem;}
  footer{text-align:center; color:#6b7a8d; font-size:.8rem; padding:1.5rem 1rem 0;}
</style>
</head>
<body>

<div class="hero">
  <h1>📂 鴻騰電子 — 公開報告</h1>
  <p>對外分享的報告區・無需登入</p>
  <span class="badge">reports.kevinhung.org/share</span>
  <br>
  <a class="home-link" href="/">🔒 進入管理後台（私人儀表板・需登入）→</a>
</div>

<div class="wrap">
  <div class="grid" id="grid">
    <div class="empty">載入中…</div>
  </div>
</div>

<footer>
  © 鴻騰電子 HonTen Electronic ・ www.honten.com.tw
</footer>

<script>
  function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}

  fetch("./manifest.json?_=" + Date.now())
    .then(function(r){ return r.ok ? r.json() : []; })
    .then(function(list){
      var grid = document.getElementById("grid");
      if (!Array.isArray(list) || list.length === 0){
        grid.innerHTML = '<div class="empty">目前沒有公開報告。</div>';
        return;
      }
      grid.innerHTML = list.map(function(it){
        var file = encodeURIComponent(it.file);
        return '<a class="card" href="./' + file + '.html">'
          + '<div class="icon">' + esc(it.icon || "📄") + '</div>'
          + '<div class="label">' + esc(it.label || "公開報告") + '</div>'
          + '<h3>' + esc(it.name || it.file) + '</h3>'
          + '<p>' + esc(it.desc || "") + '</p>'
          + '</a>';
      }).join("");
    })
    .catch(function(){
      document.getElementById("grid").innerHTML =
        '<div class="empty">清單載入失敗，請稍後重試。</div>';
    });
</script>

</body>
</html>
