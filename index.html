<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kevin Reports — 個人報告儀表板</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js" defer></script>
<style>
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    min-height: 100vh;
  }
  .hero {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 3rem 0;
    margin-bottom: 2rem;
  }
  .report-card {
    transition: transform .15s ease, box-shadow .15s ease;
    border: none;
    height: 100%;
  }
  .report-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,.12);
  }
  .report-card a {
    text-decoration: none;
    color: inherit;
    display: block;
    padding: 1.25rem;
  }
  .icon { font-size: 2rem; margin-bottom: .5rem; }
  .category-label {
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: #6c757d;
    font-weight: 600;
  }
  h5 { margin: .25rem 0; }
  .desc { font-size: .85rem; color: #6c757d; margin-bottom: 0; }
  footer { color: #6c757d; }

  /* ===== Admin / 編輯模式 ===== */
  .admin-toolbar {
    position: fixed; top: 1rem; right: 1rem; z-index: 1050;
    display: flex; gap: .5rem;
  }
  .admin-toolbar .btn { box-shadow: 0 4px 12px rgba(0,0,0,.15); }
  #btnSave { display: none; }
  body.editing #btnSave { display: inline-block; }
  body.editing #btnSave.dirty { animation: pulse 1.5s infinite; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    50%      { box-shadow: 0 4px 24px rgba(220, 53, 69, .6); }
  }

  .admin-card-actions {
    position: absolute; top: .35rem; right: .35rem;
    display: none; gap: .25rem; z-index: 10;
  }
  body.editing .admin-card-actions { display: flex; }
  body.editing .report-card { border: 2px dashed #ced4da; cursor: grab; }
  body.editing .report-card:hover { border-color: #0d6efd; }
  body.editing .report-card a { pointer-events: none; }
  body.editing .cat-title[contenteditable="true"] {
    border-bottom: 2px dashed #adb5bd;
    padding: 0 .25rem; cursor: text;
  }
  body.editing .cat-title[contenteditable="true"]:focus {
    border-bottom-color: #0d6efd; outline: none;
  }
  body.editing .cards-grid {
    min-height: 80px;
    background: rgba(255,255,255,.4);
    border: 2px dashed transparent;
    border-radius: .5rem;
    padding: .5rem;
  }
  body.editing .cards-grid.sortable-drag-over {
    border-color: #0d6efd; background: rgba(13,110,253,.05);
  }

  .admin-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,.6); color: white;
    display: none; align-items: center; justify-content: center;
    font-size: 1.25rem; font-weight: 600;
  }
  .admin-toast {
    position: fixed; bottom: 2rem; left: 50%;
    transform: translateX(-50%); z-index: 9998;
    background: #212529; color: white;
    padding: .75rem 1.5rem; border-radius: 999px;
    box-shadow: 0 4px 20px rgba(0,0,0,.3);
    transition: opacity .8s;
  }
  .admin-toast.fade-out { opacity: 0; }
</style>
</head>
<body>

<div class="admin-toolbar">
  <button id="btnSave" class="btn btn-danger" data-action="save">💾 儲存</button>
  <button id="btnEdit" class="btn btn-light" data-action="toggle-edit">✏️ 編輯</button>
</div>

<div class="hero text-center">
  <div class="container">
    <h1 class="display-5 mb-2">📊 Kevin Reports</h1>
    <p class="lead mb-0">自動更新的個人報告儀表板</p>
    <p class="small opacity-75">reports.kevinhung.org</p>
    <a href="/share/" target="_blank"
       class="btn btn-sm btn-light mt-2"
       style="border-radius:999px; box-shadow:0 4px 12px rgba(0,0,0,.15);">🌐 前往公開區（對外分享）→</a>
  </div>
</div>

<div class="container pb-5" id="sections">
  <div class="text-center text-muted py-5">載入中…</div>
</div>

<div class="container">
  <footer class="text-center small py-4 border-top">
    Powered by Cloudflare Workers + GitHub｜內容由 meta.json 動態渲染<br>
    <span class="text-muted">編輯請按右上角「✏️ 編輯」</span>
  </footer>
</div>

<script src="/admin.js" defer></script>
</body>
</html>
